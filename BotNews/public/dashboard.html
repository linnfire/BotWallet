<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>bot News — Dashboard</title><link rel="stylesheet" href="/styles.css"></head><body><nav class="nav"><a class="brand" href="/">bot <i>News</i></a><div class="nav-links"><a href="/">View publication</a><span class="pill">Publisher console</span></div></nav><main class="dashboard"><div class="dash-head"><div><div class="kicker">PUBLISHER ANALYTICS</div><h1>Agent commerce dashboard</h1></div><span class="live">● LIVE · IN MEMORY</span></div><section class="metrics"><div class="metric"><label>AI REQUESTS</label><strong id="requests">0</strong></div><div class="metric"><label>SUCCESSFUL PURCHASES</label><strong id="purchases">0</strong></div><div class="metric"><label>REVENUE EARNED</label><strong id="revenue">A$0.00</strong></div><div class="metric"><label>REVENUE TODAY</label><strong id="today">A$0.00</strong></div></section><section class="transactions"><h2>Recent transactions</h2><div id="transactionRows"><div class="empty">No agent activity yet. Make a request to a report API endpoint to start the ledger.</div></div></section></main><script>const money=c=>`A$${(c/100).toFixed(2)}`;function load(){fetch('/api/dashboard/metrics').then(r=>r.json()).then(d=>{requests.textContent=d.aiRequests;purchases.textContent=d.successfulPurchases;revenue.textContent=money(d.revenueEarned);today.textContent=money(d.revenueToday);transactionRows.innerHTML=d.recentTransactions.length?d.recentTransactions.map(t=>`<div class="row"><div><strong>${t.reportTitle}</strong><br><small>${new Date(t.createdAt).toLocaleString()}</small></div><span>${t.agentId}</span><span class="status">${t.status}</span><strong>${t.type==='purchase'?money(t.amount):'—'}</strong></div>`).join(''):'<div class="empty">No agent activity yet. Make a request to a report API endpoint to start the ledger.</div>'})}load();setInterval(load,5000)</script></body></html>
